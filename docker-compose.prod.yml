services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bom_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-bom_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bom_tracker} -d ${POSTGRES_DB:-bom_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-bom_tracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bom_tracker}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-bom_tracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bom_tracker}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      UPLOAD_DIRECTORY: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-10}
      MUTATION_RATE_LIMIT_PER_MINUTE: ${MUTATION_RATE_LIMIT_PER_MINUTE:-120}
      LLM_PROVIDER: ${LLM_PROVIDER:-rule_based}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-20}
      LLM_FALLBACK_TO_RULE_BASED: ${LLM_FALLBACK_TO_RULE_BASED:-true}
    volumes:
      - uploaded_files:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploaded_files:
