name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend/app backend/alembic

      - name: Run backend tests
        run: backend/.venv/bin/pytest

      - name: Run performance smoke
        env:
          PYTHONPATH: backend
          PERF_BOM_ROWS: "100"
        run: backend/.venv/bin/python scripts/performance_smoke.py

      - name: Validate Alembic migrations
        env:
          DATABASE_URL: sqlite:////tmp/bom_tracker_ci.sqlite
          JWT_SECRET_KEY: ci-only-secret
        run: |
          cd backend
          .venv/bin/alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
