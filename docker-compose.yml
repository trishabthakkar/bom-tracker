services:
  postgres:
    image: postgres:16-alpine
    container_name: bom-tracker-postgres
    environment:
      POSTGRES_DB: bom_tracker
      POSTGRES_USER: bom_tracker
      POSTGRES_PASSWORD: bom_tracker_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bom_tracker -d bom_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
